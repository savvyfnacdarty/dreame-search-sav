/* ══════════════════════════════════════════════════════════════
   CODES ERREURS — styles spécifiques
══════════════════════════════════════════════════════════════ */

/* Toolbar recherche (collé sous le header) */
.toolbar-codes {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 64px; /* hauteur header unifié */
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

.search-wrap-codes {
  flex: 1;
  min-width: 240px;
  position: relative;
}

.search-wrap-codes::before {
  content: "⌕";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--muted);
  pointer-events: none;
}

.search-input-codes {
  width: 100%;
  padding: 9px 14px 9px 38px;
  font-family: var(--font-ui);
  font-size: 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  color: var(--text);
  transition: border-color var(--tr);
}

.search-input-codes:focus {
  outline: none;
  border-color: var(--fd-red);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.chips-codes { display: flex; gap: 6px; }

.chip-code {
  background: var(--surface-3);
  color: var(--text-2);
  border: 1.5px solid var(--border);
  padding: 7px 14px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: var(--r-md);
  transition: all var(--tr);
}

.chip-code:hover { border-color: var(--border-strong); color: var(--text); }

.chip-code.active {
  background: var(--fd-navy);
  color: var(--fd-yellow);
  border-color: var(--fd-navy);
}

[data-theme="dark"] .chip-code.active {
  background: var(--fd-yellow);
  color: var(--fd-navy);
  border-color: var(--fd-yellow);
}

.stats-codes {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: var(--r-md);
  white-space: nowrap;
  font-family: var(--font-mono);
}

.print-btn {
  padding: 7px 14px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 600;
  transition: all var(--tr);
  white-space: nowrap;
}
.print-btn:hover { border-color: var(--fd-navy); color: var(--fd-navy); background: var(--surface-2); }

/* ── Section bands ── */
.section-band {
  background: var(--fd-navy);
  color: #fff;
  padding: 10px 20px;
  font-family: var(--font-cond);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  border-left: 4px solid var(--fd-yellow);
  margin-top: 16px;
}
.section-band:first-of-type { margin-top: 0; }

/* ── Table ── */
.table-wrap-codes { padding: 0 20px 40px; }

table { width: 100%; border-collapse: collapse; background: var(--surface); box-shadow: var(--shadow-sm); font-size: 14px; }

thead th {
  background: var(--fd-navy);
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-weight: 700;
  font-family: var(--font-cond);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-size: 12px;
  border-bottom: 2px solid var(--fd-yellow);
  position: sticky;
  top: 120px; /* 64px header + ~56px toolbar */
  z-index: 10;
}

thead th.col-code { text-align: center; width: 70px; }
thead th.col-en   { width: 24%; }
thead th.col-fr   { width: 26%; }

tbody tr { border-bottom: 1px solid var(--rule); transition: background var(--tr); }

tbody tr:nth-child(even) td.cell-en,
tbody tr:nth-child(even) td.cell-fr { background: var(--surface-2); }

tbody tr:hover td.cell-en,
tbody tr:hover td.cell-fr { background: var(--surface-3); }

td { padding: 8px 12px; vertical-align: middle; }

.cell-code {
  background: var(--fd-yellow);
  color: var(--fd-navy);
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 15px;
  text-align: center;
  cursor: pointer;
  width: 70px;
  user-select: none;
  border-right: 1px solid var(--border);
  transition: filter var(--tr);
}
.cell-code:hover { filter: brightness(.9); }
.cell-code.copied { background: var(--green); color: white; }

[data-theme="dark"] .cell-code { background: #d4920a; color: #fff; }

.cell-en  { color: var(--text-2); }
.cell-fr  { color: var(--text); font-weight: 600; }
.cell-action {
  background: var(--green-bg);
  color: var(--green);
  font-weight: 500;
  border-left: 1px solid var(--border);
  font-size: 13px;
}
[data-theme="dark"] .cell-action { color: #6ee7b7; }

mark {
  background: var(--fd-red);
  color: white;
  padding: 0 3px;
  border-radius: 2px;
  font-weight: 600;
}

.empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
  font-size: 16px;
  background: var(--surface);
  margin: 0 20px;
  border-radius: var(--r-md);
}

/* ── Footer ── */
.footer-codes {
  padding: 14px 20px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  border-top: 1px solid var(--border);
  background: var(--surface);
  letter-spacing: 0.3px;
}
.footer-codes .accent { color: var(--fd-red); font-weight: 700; }

/* ── Toast codes ── */
.toast-codes {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: white;
  padding: 10px 20px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  border-radius: var(--r-md);
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 3000;
}
.toast-codes.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ Print ══ */
@media print {
  @page { size: A4 landscape; margin: 10mm; }
  body { background: white !important; color: black !important; font-size: 9pt; }
  .hdr, .toolbar-codes, .footer-codes { display: none !important; }
  .section-band { background: #1a2744 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin-top: 8px; padding: 6px 10px; font-size: 11pt; }
  .table-wrap-codes { padding: 0; }
  table { box-shadow: none; font-size: 8.5pt; page-break-inside: auto; }
  thead th { background: #1a2744 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; position: static; padding: 5px 8px; }
  .cell-code { background: #F5A623 !important; color: #1A2744 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; cursor: default; }
  .cell-action { background: #ECFDF5 !important; color: #065F46 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tbody tr:nth-child(even) td.cell-en, tbody tr:nth-child(even) td.cell-fr { background: #F3F4F6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr { page-break-inside: avoid; }
  thead { display: table-header-group; }
  td { padding: 4px 6px; }
}

@media (max-width: 700px) {
  .toolbar-codes { padding: 10px 12px; top: 64px; }
  .table-wrap-codes { padding: 0 10px 30px; }
  td, thead th { padding: 6px 8px; font-size: 12px; }
  thead th { top: 130px; }
  .section-band { margin-left: -10px; margin-right: -10px; }
}
</style>

/* ══════════════════════════════════════════════════════════════
   DARK MODE
══════════════════════════════════════════════════════════════ */
const LS_THEME = 'fd_sav_theme';
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☾' : '☀';
  try { localStorage.setItem(LS_THEME, next); } catch(e) {}
}
(function(){
  try {
    const s = localStorage.getItem(LS_THEME);
    if (s) {
      document.documentElement.dataset.theme = s;
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = s === 'dark' ? '☾' : '☀';
    }
  } catch(e) {}
})();

/* ══════════════════════════════════════════════════════════════
   ÉTAT
══════════════════════════════════════════════════════════════ */
const STATE = { filter: "all", query: "" };

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ")", "gi");
  return safe.replace(re, "<mark>$1</mark>");
}
function rowMatches(row, query) {
  if (!query) return true;
  return (String(row[0]) + " " + row[1] + " " + row[2] + " " + row[3]).toLowerCase().includes(query);
}

/* ══════════════════════════════════════════════════════════════
   RENDU
══════════════════════════════════════════════════════════════ */
function buildSectionHTML(title, rows, query) {
  if (!rows.length) return "";
  const tbody = rows.map(r => `
    <tr>
      <td class="cell-code" onclick="copyCode(this, ${r[0]})" title="Cliquer pour copier">${r[0]}</td>
      <td class="cell-en">${highlight(r[1], query)}</td>
      <td class="cell-fr">${highlight(r[2], query)}</td>
      <td class="cell-action">${highlight(r[3], query)}</td>
    </tr>`).join("");
  return `
    <div class="section-band">${title} — ${rows.length} code${rows.length > 1 ? "s" : ""}</div>
    <div class="table-wrap-codes">
      <table>
        <thead>
          <tr>
            <th class="col-code">Code</th>
            <th class="col-en">English</th>
            <th class="col-fr">Français</th>
            <th class="col-action">Action SAV — Geste atelier</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

function render() {
  const q = STATE.query.trim().toLowerCase();
  const robot = STATE.filter === "base"  ? [] : DATA.robot.filter(r => rowMatches(r, q));
  const base  = STATE.filter === "robot" ? [] : DATA.base.filter(r => rowMatches(r, q));
  const total = robot.length + base.length;
  document.getElementById("stats").textContent = `${total} / ${DATA.robot.length + DATA.base.length}`;
  const content = document.getElementById("content");
  if (total === 0) {
    content.innerHTML = `<div class="empty">Aucun résultat pour <strong>«&nbsp;${escapeHtml(STATE.query)}&nbsp;»</strong></div>`;
    return;
  }
  content.innerHTML =
    buildSectionHTML("Robot — Codes 0 à 89", robot, q) +
    buildSectionHTML("Station de base — Codes 100 à 125", base, q);
}

/* ══════════════════════════════════════════════════════════════
   INTERACTIONS
══════════════════════════════════════════════════════════════ */
function setFilter(btn) {
  document.querySelectorAll(".chip-code").forEach(c => c.classList.remove("active"));
  btn.classList.add("active");
  STATE.filter = btn.dataset.section;
  render();
}

function copyCode(cell, code) {
  navigator.clipboard.writeText(String(code))
    .then(() => { cell.classList.add("copied"); showToast(`Code ${code} copié`); setTimeout(() => cell.classList.remove("copied"), 700); })
    .catch(() => showToast("Copie impossible"));
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 1500);
}

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
document.getElementById("search").addEventListener("input", e => {
  STATE.query = e.target.value; render();
});
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "/") { e.preventDefault(); document.getElementById("search").focus(); }
});
render();
</script>
