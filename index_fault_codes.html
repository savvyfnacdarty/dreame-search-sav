/* ============================================================
   CODES ERREURS SAV — Module OVPEM
   Single-file HTML, industrial-utilitarian, print-ready
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Light theme (default) */
  --bg:           #F9FAFB;
  --surface:     #FFFFFF;
  --surface-2:   #F3F4F6;
  --border:      #D1D5DB;
  --border-soft: #E5E7EB;
  --text:        #111827;
  --text-soft:   #4B5563;
  --text-muted:  #6B7280;
  --header-bg:   #1F2937;
  --header-txt:  #FFFFFF;
  --band-bg:     #374151;
  --accent:      #DC2626;
  --code-bg:     #FACC15;
  --code-txt:    #111827;
  --action-bg:   #ECFDF5;
  --action-txt:  #065F46;
  --row-alt:     #F3F4F6;
  --chip-bg:     #E5E7EB;
  --chip-active: #1F2937;
  --input-bg:    #FFFFFF;
  --shadow:      0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}

[data-theme="dark"] {
  --bg:           #0F172A;
  --surface:     #1E293B;
  --surface-2:   #334155;
  --border:      #475569;
  --border-soft: #334155;
  --text:        #F1F5F9;
  --text-soft:   #CBD5E1;
  --text-muted:  #94A3B8;
  --header-bg:   #020617;
  --header-txt:  #F8FAFC;
  --band-bg:     #1E293B;
  --accent:      #EF4444;
  --code-bg:     #EAB308;
  --code-txt:    #0F172A;
  --action-bg:   #064E3B;
  --action-txt:  #A7F3D0;
  --row-alt:     #283449;
  --chip-bg:     #334155;
  --chip-active: #EAB308;
  --input-bg:    #0F172A;
  --shadow:      0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
}

html, body {
  height: 100%;
  font-family: 'Barlow Condensed', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.35;
}

/* ---------- Top bar ---------- */
.topbar {
  background: var(--header-bg);
  color: var(--header-txt);
  padding: 12px 20px;
  border-bottom: 3px solid var(--accent);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow);
}

.brand {
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.brand .sep {
  color: var(--accent);
  margin: 0 8px;
  font-weight: 400;
}

.subtitle {
  font-size: 14px;
  color: #CBD5E1;
  font-weight: 400;
  letter-spacing: 0.3px;
}

.topbar-actions {
  margin-left: auto;
  display: flex;
  gap: 8px;
}

.icon-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  color: var(--header-txt);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  border-radius: 3px;
  transition: background .15s;
  text-transform: uppercase;
}

.icon-btn:hover {
  background: rgba(255,255,255,.16);
}

/* ---------- Toolbar ---------- */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border-soft);
  padding: 12px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  position: sticky;
  top: 56px;
  z-index: 40;
}

.search-wrap {
  flex: 1;
  min-width: 240px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  font-family: inherit;
  font-size: 16px;
  border: 2px solid var(--border);
  border-radius: 4px;
  background: var(--input-bg);
  color: var(--text);
  transition: border-color .15s;
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
}

.search-wrap::before {
  content: "⌕";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--text-muted);
  pointer-events: none;
}

.chips {
  display: flex;
  gap: 6px;
}

.chip {
  background: var(--chip-bg);
  color: var(--text);
  border: none;
  padding: 8px 14px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 3px;
  transition: all .15s;
}

.chip.active {
  background: var(--chip-active);
  color: var(--code-bg);
}

.stats {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  padding: 4px 10px;
  background: var(--surface-2);
  border-radius: 3px;
  font-weight: 600;
  white-space: nowrap;
}

/* ---------- Section bands ---------- */
.section-band {
  background: var(--band-bg);
  color: var(--header-txt);
  padding: 10px 20px;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-left: 4px solid var(--accent);
  margin-top: 16px;
}

.section-band:first-of-type {
  margin-top: 0;
}

/* ---------- Table ---------- */
.table-wrap {
  padding: 0 20px 40px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  box-shadow: var(--shadow);
  font-size: 14px;
}

thead th {
  background: var(--header-bg);
  color: var(--header-txt);
  padding: 10px 12px;
  text-align: left;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  font-size: 13px;
  border-bottom: 2px solid var(--accent);
  position: sticky;
  top: 122px;
  z-index: 10;
}

thead th.col-code,
thead th.col-action { text-align: left; }
thead th.col-code { text-align: center; width: 70px; }
thead th.col-en   { width: 24%; }
thead th.col-fr   { width: 26%; }

tbody tr {
  border-bottom: 1px solid var(--border-soft);
  transition: background .1s;
}

tbody tr:nth-child(even) td.cell-en,
tbody tr:nth-child(even) td.cell-fr {
  background: var(--row-alt);
}

tbody tr:hover td.cell-en,
tbody tr:hover td.cell-fr {
  background: var(--border-soft);
}

td {
  padding: 8px 12px;
  vertical-align: middle;
}

.cell-code {
  background: var(--code-bg);
  color: var(--code-txt);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 15px;
  text-align: center;
  cursor: pointer;
  width: 70px;
  user-select: none;
  border-right: 1px solid var(--border);
  transition: filter .15s;
}

.cell-code:hover {
  filter: brightness(.92);
}

.cell-code.copied {
  background: #10B981;
  color: white;
}

.cell-en  { color: var(--text-soft); }
.cell-fr  { color: var(--text); font-weight: 600; }
.cell-action {
  background: var(--action-bg);
  color: var(--action-txt);
  font-weight: 500;
  border-left: 1px solid var(--border-soft);
}

/* Highlight search match */
mark {
  background: var(--accent);
  color: white;
  padding: 0 3px;
  border-radius: 2px;
  font-weight: 600;
}

/* ---------- Empty state ---------- */
.empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 18px;
  background: var(--surface);
  margin: 0 20px;
  border-radius: 4px;
}

/* ---------- Footer ---------- */
.footer {
  padding: 14px 20px;
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  border-top: 1px solid var(--border-soft);
  background: var(--surface);
  letter-spacing: 0.3px;
}

.footer .accent { color: var(--accent); font-weight: 600; }

/* ---------- Copy toast ---------- */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #10B981;
  color: white;
  padding: 10px 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
  border-radius: 4px;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 100;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================
   PRINT styles — A4 paysage
   ============================================================ */
@media print {
  @page {
    size: A4 landscape;
    margin: 10mm;
  }

  body {
    background: white !important;
    color: black !important;
    font-size: 9pt;
  }

  .topbar,
  .toolbar,
  .footer { display: none !important; }

  .section-band {
    background: #1F2937 !important;
    color: white !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    margin-top: 8px;
    padding: 6px 10px;
    font-size: 11pt;
  }

  .table-wrap { padding: 0; }

  table {
    box-shadow: none;
    font-size: 8.5pt;
    page-break-inside: auto;
  }

  thead th {
    background: #1F2937 !important;
    color: white !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    position: static;
    padding: 5px 8px;
  }

  .cell-code {
    background: #FACC15 !important;
    color: #111827 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    cursor: default;
  }

  .cell-action {
    background: #ECFDF5 !important;
    color: #065F46 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  tbody tr:nth-child(even) td.cell-en,
  tbody tr:nth-child(even) td.cell-fr {
    background: #F3F4F6 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  tr { page-break-inside: avoid; }
  thead { display: table-header-group; }
  td { padding: 4px 6px; }
}

/* ---------- Responsive ---------- */
@media (max-width: 700px) {
  .topbar { padding: 10px 12px; gap: 10px; }
  .brand { font-size: 16px; }
  .subtitle { display: none; }
  .toolbar { padding: 10px 12px; top: 64px; }
  .table-wrap { padding: 0 10px 30px; }
  td, thead th { padding: 6px 8px; font-size: 12px; }
  thead th { top: 130px; }
  .section-band { margin-left: -10px; margin-right: -10px; }
}
</style>

/* ============================================================
   État
   ============================================================ */
const STATE = {
  filter: "all",
  query: "",
};

const LS_KEY_THEME = "ovpem_codes_theme";

/* ============================================================
   Rendu
   ============================================================ */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function highlight(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ")", "gi");
  return safe.replace(re, "<mark>$1</mark>");
}

function rowMatches(row, query) {
  if (!query) return true;
  const haystack = (String(row[0]) + " " + row[1] + " " + row[2] + " " + row[3]).toLowerCase();
  return haystack.includes(query);
}

function buildSectionHTML(title, rows, query) {
  if (!rows.length) return "";
  const tbody = rows.map(r => `
    <tr>
      <td class="cell-code" onclick="copyCode(this, ${r[0]})" title="Cliquer pour copier">${r[0]}</td>
      <td class="cell-en">${highlight(r[1], query)}</td>
      <td class="cell-fr">${highlight(r[2], query)}</td>
      <td class="cell-action">${highlight(r[3], query)}</td>
    </tr>
  `).join("");
  return `
    <div class="section-band">${title} — ${rows.length} code${rows.length > 1 ? "s" : ""}</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-code">Code</th>
            <th class="col-en">English</th>
            <th class="col-fr">Français</th>
            <th class="col-action">Action SAV — Geste atelier</th>
          </tr>
        </thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  `;
}

function render() {
  const q = STATE.query.trim().toLowerCase();
  let robot = STATE.filter === "base"  ? [] : DATA.robot.filter(r => rowMatches(r, q));
  let base  = STATE.filter === "robot" ? [] : DATA.base.filter(r => rowMatches(r, q));

  const total = robot.length + base.length;
  const totalAll = DATA.robot.length + DATA.base.length;
  document.getElementById("stats").textContent = `${total} / ${totalAll}`;

  const content = document.getElementById("content");
  if (total === 0) {
    content.innerHTML = `<div class="empty">Aucun résultat pour <strong>« ${escapeHtml(STATE.query)} »</strong></div>`;
    return;
  }
  content.innerHTML =
    buildSectionHTML("Robot — Codes 0 à 89",      robot, q) +
    buildSectionHTML("Station de base — Codes 100 à 125", base, q);
}

/* ============================================================
   Interactions
   ============================================================ */
function setFilter(btn) {
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  btn.classList.add("active");
  STATE.filter = btn.dataset.section;
  render();
}

function copyCode(cell, code) {
  navigator.clipboard.writeText(String(code)).then(() => {
    cell.classList.add("copied");
    showToast(`Code ${code} copié`);
    setTimeout(() => cell.classList.remove("copied"), 700);
  }).catch(() => {
    showToast("Copie impossible");
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("show"), 1500);
}

function toggleTheme() {
  const cur = document.body.dataset.theme;
  const next = cur === "dark" ? "light" : "dark";
  document.body.dataset.theme = next;
  document.getElementById("theme-btn").textContent = next === "dark" ? "☾ THÈME" : "☀ THÈME";
  try { localStorage.setItem(LS_KEY_THEME, next); } catch (e) {}
}

/* ============================================================
   Init
   ============================================================ */
(function init() {
  try {
    const saved = localStorage.getItem(LS_KEY_THEME);
    if (saved === "dark") {
      document.body.dataset.theme = "dark";
      document.getElementById("theme-btn").textContent = "☾ THÈME";
    }
  } catch (e) {}

  document.getElementById("search").addEventListener("input", (e) => {
    STATE.query = e.target.value;
    render();
  });

  // Raccourcis : "/" focus recherche, "p" imprimer
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === "/") {
      e.preventDefault();
      document.getElementById("search").focus();
    } else if (e.key.toLowerCase() === "p" && (e.ctrlKey || e.metaKey)) {
      // laisser le navigateur gérer Ctrl+P natif
    }
  });

  render();
})();
</script>
