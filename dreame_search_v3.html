function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(text,q){
  if(!q)return esc(text);
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(text).replace(re,'<span class="hl">$1</span>');
}
function clear(){document.getElementById('q').value='';document.getElementById('results').innerHTML='';document.getElementById('q').focus()}

function search(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const wrap=document.getElementById('results');
  if(!q){wrap.innerHTML='';return}
  
  const hits=FOLDERS.filter(f=>
    f.name.toLowerCase().includes(q)||
    f.ref.toLowerCase().includes(q)||
    f.product.toLowerCase().includes(q)
  );
  
  if(hits.length===0){
    wrap.innerHTML='<div class="empty">Aucun dossier trouvé pour <b>"'+esc(q)+'"</b></div>';
    return;
  }
  
  wrap.innerHTML='<div class="rh"><b>'+hits.length+'</b> dossier'+(hits.length>1?'s':'')+' trouvé'+(hits.length>1?'s':'')+'</div>'+
    hits.map(f=>'<a class="ri" href="'+esc(f.url)+'" target="_blank">'+
      '<div class="ri-icon">📁</div>'+
      '<div class="ri-info">'+
        '<div class="ri-name">'+hl(f.product,q)+'</div>'+
        '<div class="ri-ref">'+hl(f.ref,q)+'</div>'+
      '</div>'+
      '<div class="ri-arr">→</div>'+
    '</a>').join('');
}
