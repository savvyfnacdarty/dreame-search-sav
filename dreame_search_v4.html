<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f0f0;min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
header{background:#1a1a1a;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.logos{display:flex;gap:8px;align-items:center}
.logo-fnac{background:#F7A600;color:#1a1a1a;font-weight:900;font-size:13px;padding:3px 8px;border-radius:3px}
.logo-darty{background:#E30613;color:white;font-weight:900;font-size:13px;padding:3px 8px;border-radius:3px}
.htitle{color:#aaa;font-size:13px;margin-left:14px;border-left:1px solid #444;padding-left:14px}
.htitle b{color:#F7A600}
.badge{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:36px 20px 60px}

/* ── SEARCH CARD ── */
.card{background:white;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.10);padding:28px 32px;width:100%;max-width:680px}
.card h2{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.card p{font-size:13px;color:#888;margin-bottom:18px;line-height:1.5}
.row{display:flex;gap:10px}
.search-input{flex:1;padding:11px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
.search-input:focus{border-color:#F7A600}
.search-input::placeholder{color:#bbb}
.btn-clear{padding:11px 16px;background:#f5f5f5;color:#888;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;transition:background .15s}
.btn-clear:hover{background:#e8e8e8}

/* ── RESULTS ── */
.results{width:100%;max-width:680px;margin-top:14px}
.rh{font-size:12px;color:#888;margin-bottom:8px;padding:0 4px}
.ri{background:white;border-radius:8px;border:1px solid #e8e8e8;padding:12px 16px;margin-bottom:7px;display:flex;align-items:center;gap:14px;transition:all .15s}
.ri:hover{border-color:#F7A600;box-shadow:0 2px 12px rgba(247,166,0,0.15);transform:translateY(-1px)}
.ri-icon{font-size:22px;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-ref{font-size:11px;color:#aaa;margin-top:2px;font-family:monospace}
.ri-actions{display:flex;gap:8px;flex-shrink:0}
.btn-sp{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn-sp-open{background:#f0f5ff;color:#1a4dc4;border:1px solid #c8d9ff}
.btn-sp-open:hover{background:#ddeaff}
.btn-sp-bom{background:#F7A600;color:#1a1a1a}
.btn-sp-bom:hover{background:#e69500}
.hl{background:rgba(247,166,0,0.35);border-radius:2px;padding:0 2px}
.empty{text-align:center;padding:32px;color:#aaa;font-size:14px;background:white;border-radius:8px}

/* ══════════════════════════════════════════════════
   VISIONNEUSE BOM — MODALE PLEIN ÉCRAN
══════════════════════════════════════════════════ */
.bom-overlay{position:fixed;inset:0;background:#0f1117;z-index:1000;display:flex;flex-direction:column;animation:fadeIn .15s ease}
.bom-overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* topbar */
.bom-topbar{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:0 20px;height:54px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.bom-close{background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1;transition:color .15s}
.bom-close:hover{color:white}
.bom-title{flex:1;font-size:15px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bom-subtitle{font-size:12px;color:#666;white-space:nowrap}

/* toolbar */
.bom-toolbar{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.bom-search-wrap{position:relative;flex:1;min-width:180px}
.bom-search{width:100%;padding:8px 32px 8px 12px;background:#0f1117;border:1px solid #2a2d3a;border-radius:7px;color:white;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.bom-search:focus{border-color:#F7A600}
.bom-search::placeholder{color:#555}
.bom-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:2px;line-height:1}
.bom-search-clear:hover{color:#aaa}
.bom-count{font-size:12px;color:#555;white-space:nowrap}
.bom-view-btns{display:flex;gap:4px}
.bom-view-btn{background:#0f1117;border:1px solid #2a2d3a;color:#666;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
.bom-view-btn.active,.bom-view-btn:hover{background:#F7A600;color:#1a1a1a;border-color:#F7A600}
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 20px;background:#1a1d27;border-bottom:1px solid #2a2d3a}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #2a2d3a;background:#0f1117;color:#888;transition:all .15s}
.chip:hover{border-color:#F7A600;color:#F7A600}
.chip.active{background:#F7A600;color:#1a1a1a;border-color:#F7A600}
.chip-count{opacity:.7;font-weight:400}

/* content */
.bom-content{flex:1;overflow-y:auto;padding:20px}
.bom-content::-webkit-scrollbar{width:6px}
.bom-content::-webkit-scrollbar-track{background:transparent}
.bom-content::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:4px}

/* dropzone */
.dropzone{border:2px dashed #2a2d3a;border-radius:12px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;margin:40px auto;max-width:480px}
.dropzone:hover,.dropzone.over{border-color:#F7A600;background:rgba(247,166,0,0.05)}
.dropzone-icon{font-size:48px;margin-bottom:16px}
.dropzone h3{color:white;font-size:17px;margin-bottom:8px}
.dropzone p{color:#666;font-size:13px;line-height:1.6;margin-bottom:20px}
.btn-pick{padding:10px 22px;background:#F7A600;color:#1a1a1a;font-weight:700;font-size:13px;border:none;border-radius:8px;cursor:pointer}
.btn-pick:hover{background:#e69500}

/* loader */
.bom-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:16px;color:#666}
.spinner{width:36px;height:36px;border:3px solid #2a2d3a;border-top-color:#F7A600;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{font-size:14px}

/* grid */
.bom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.bom-card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s;text-align:left}
.bom-card:hover{border-color:#F7A600;transform:translateY(-2px);box-shadow:0 4px 20px rgba(247,166,0,0.15)}
.bom-thumb{width:100%;height:140px;background:#0f1117;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bom-thumb img{max-width:100%;max-height:100%;object-fit:contain}
.bom-thumb-empty{color:#2a2d3a;font-size:36px}
.bom-card-body{padding:10px 12px}
.bom-ref{font-family:monospace;font-size:11px;color:#F7A600;margin-bottom:3px}
.bom-desig{font-size:12px;color:#ccc;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bom-meta{font-size:11px;color:#555;margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.bom-meta span{background:#0f1117;padding:2px 6px;border-radius:4px}

/* table */
.bom-table-wrap{overflow-x:auto}
.bom-table{width:100%;border-collapse:collapse;font-size:13px}
.bom-table thead{background:#1a1d27;position:sticky;top:0}
.bom-table th{padding:10px 12px;text-align:left;color:#888;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #2a2d3a;white-space:nowrap}
.bom-table tbody tr{border-bottom:1px solid #1a1d27;cursor:pointer;transition:background .1s}
.bom-table tbody tr:hover{background:#1a1d27}
.bom-table td{padding:8px 12px;color:#ccc;vertical-align:middle}
.bom-table td.td-thumb{width:60px}
.bom-table td.td-thumb img{width:48px;height:48px;object-fit:contain;border-radius:4px;background:#0f1117}
.bom-table td.td-ref code{font-size:11px;color:#F7A600;background:#0f1117;padding:2px 6px;border-radius:4px}

/* detail */
.bom-detail{max-width:700px;margin:0 auto}
.bom-back{background:none;border:none;color:#F7A600;cursor:pointer;font-size:13px;padding:0;margin-bottom:20px;display:flex;align-items:center;gap:6px}
.bom-back:hover{text-decoration:underline}
.bom-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:560px){.bom-detail-grid{grid-template-columns:1fr}}
.bom-detail-img{background:#1a1d27;border-radius:12px;border:1px solid #2a2d3a;display:flex;align-items:center;justify-content:center;min-height:240px;overflow:hidden;padding:16px}
.bom-detail-img img{max-width:100%;max-height:300px;object-fit:contain}
.bom-detail-noimg{color:#555;font-size:13px;text-align:center}
.bom-detail-info{display:flex;flex-direction:column;gap:12px}
.bom-detail-ref{font-family:monospace;font-size:22px;font-weight:700;color:#F7A600}
.bom-detail-desig{font-size:18px;color:white;font-weight:600;line-height:1.3}
.bom-detail-fields{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.bom-detail-field{background:#1a1d27;border-radius:8px;padding:10px 14px;border:1px solid #2a2d3a}
.bom-detail-label{font-size:10px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.bom-detail-value{font-size:13px;color:#ccc}

.bom-no-results{text-align:center;padding:40px;color:#555;font-size:14px}
.bom-foot{background:#1a1d27;border-top:1px solid #2a2d3a;padding:8px 20px;font-size:11px;color:#555;flex-shrink:0}

.search-hl{background:rgba(247,166,0,0.35);border-radius:2px;padding:0 1px}
</style>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hl(t,q){if(!q)return esc(t);const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return esc(t).replace(re,'<span class="hl">$1</span>')}

function clearSearch(){document.getElementById('q').value='';document.getElementById('results').innerHTML='';document.getElementById('q').focus()}

function doSearch(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const wrap=document.getElementById('results');
  if(!q){wrap.innerHTML='';return}
  const hits=FOLDERS.filter(f=>f.name.toLowerCase().includes(q)||f.ref.toLowerCase().includes(q)||f.product.toLowerCase().includes(q));
  if(!hits.length){wrap.innerHTML='<div class="empty">Aucun dossier trouvé pour "'+esc(q)+'"</div>';return}
  wrap.innerHTML='<div class="rh"><b>'+hits.length+'</b> dossier'+(hits.length>1?'s':'')+' trouvé'+(hits.length>1?'s':'')+'</div>'+
    hits.map(f=>{
      const spUrl=SP_BASE+encodeURIComponent(f.name);
      return '<div class="ri">'+
        '<div class="ri-icon">📁</div>'+
        '<div class="ri-info">'+
          '<div class="ri-name">'+hl(f.product,q)+'</div>'+
          '<div class="ri-ref">'+hl(f.ref,q)+'</div>'+
        '</div>'+
        '<div class="ri-actions">'+
          '<a class="btn-sp btn-sp-open" href="'+esc(spUrl)+'" target="_blank" title="Ouvrir dans SharePoint">📂 SharePoint</a>'+
          '<button class="btn-sp btn-sp-bom" onclick="openBom(\''+esc(f.name)+'\',\''+esc(f.product)+'\')">📋 Charger BOM</button>'+
        '</div>'+
      '</div>';
    }).join('');
}

// VISIONNEUSE BOM
// ════════════════════════════════════════════
const BOM = {rows:[],filtered:[],view:'grid',detail:null,filterText:'',filterCat:'__all__',imgOnly:false,currentName:''};
const SHEETJS_CDN='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
const JSZIP_CDN='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
const JSZIP_CDN2='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';

function loadScript(url,fallback){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');s.src=url;s.async=true;
    s.onload=resolve;
    s.onerror=fallback?()=>loadScript(fallback).then(resolve,reject):()=>reject(new Error('CDN inaccessible: '+url));
    document.head.appendChild(s);
  });
}
async function ensureSheetJS(){if(typeof XLSX==='undefined')await loadScript(SHEETJS_CDN)}
async function ensureJSZip(){if(typeof JSZip==='undefined')await loadScript(JSZIP_CDN,JSZIP_CDN2)}

function openBom(folderName, productName){
  BOM.rows=[];BOM.filtered=[];BOM.detail=null;BOM.filterText='';BOM.filterCat='__all__';BOM.currentName=productName;
  document.getElementById('bomOverlay').classList.remove('hidden');
  document.getElementById('bomTitle').textContent=productName;
  document.getElementById('bomSubtitle').textContent=folderName;
  document.getElementById('bomToolbar').style.display='none';
  document.getElementById('chipBar').style.display='none';
  document.getElementById('bomSearch').value='';
  document.getElementById('bomFoot').textContent='';
  showDropzone();
}

function closeBom(){document.getElementById('bomOverlay').classList.add('hidden')}

function showDropzone(){
  document.getElementById('bomContent').innerHTML=
    '<div class="dropzone" id="dz" onclick="pickFile()" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">'+
      '<div class="dropzone-icon">📋</div>'+
      '<h3>Charger le BOM Excel</h3>'+
      '<p>Télécharge le fichier Excel depuis le dossier SharePoint,<br>puis glisse-le ici ou clique pour le sélectionner.</p>'+
      '<button class="btn-pick" onclick="pickFile();event.stopPropagation()">Choisir un fichier .xlsx</button>'+
    '</div>';
}

function pickFile(){document.getElementById('fileInput').click()}
document.getElementById('fileInput').addEventListener('change',e=>{
  const f=e.target.files&&e.target.files[0];
  if(f)handleFile(f);
  e.target.value='';
});
function dzOver(e){e.preventDefault();document.getElementById('dz')&&document.getElementById('dz').classList.add('over')}
function dzLeave(){document.getElementById('dz')&&document.getElementById('dz').classList.remove('over')}
function dzDrop(e){e.preventDefault();dzLeave();const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f)handleFile(f)}

async function handleFile(file){
  showLoader('Chargement des bibliothèques…');
  try{
    await ensureSheetJS();
    showLoader('Analyse du fichier & extraction des images…');
    const buf=await file.arrayBuffer();
    const parsed=await parseWorkbook(buf,file.name);
    if(!parsed.rows.length){showError('Aucune pièce détectée dans ce fichier.');return}
    BOM.rows=parsed.rows;BOM.filtered=parsed.rows.slice();
    document.getElementById('bomToolbar').style.display='flex';
    document.getElementById('chipBar').style.display='flex';
    renderBomView();
    let imgInfo=parsed.embeddedCount>0?' · '+parsed.embeddedCount+' image(s) extraite(s)':parsed.embeddedError?' · ⚠ images indisponibles':' · aucune image détectée';
    document.getElementById('bomFoot').textContent=parsed.rows.length+' pièces'+imgInfo+' · '+file.name;
  }catch(e){showError('Erreur : '+(e.message||e))}
}

function showLoader(msg){
  document.getElementById('bomContent').innerHTML='<div class="bom-loader"><div class="spinner"></div><div class="loader-msg">'+esc(msg)+'</div></div>';
}
function showError(msg){
  document.getElementById('bomContent').innerHTML='<div class="bom-loader"><div style="font-size:36px;margin-bottom:12px">⚠</div><div class="loader-msg" style="color:#ef4444">'+esc(msg)+'</div><button class="btn-pick" style="margin-top:16px" onclick="showDropzone()">Réessayer</button></div>';
}

// ═══ Extraction images (même logique que index.html) ═══
const COL_HINTS={
  ref:['ref','reference','sku','code','p/n','pn','part no','part number','numero','no','item code','material','materiel'],
  desig:['designation','description','libelle','name','nom','product','produit','item','article','spare part'],
  image:['image','photo','picture','visuel','illustration','preview','apercu','img'],
  cat:['categorie','category','groupe','group','zone','module','section','type','famille','family','assembly'],
  price:['prix','price','tarif','cost','cout','pvc','pvp','msrp'],
  qty:['qty','quantite','quantity','stock','qte'],
  note:['note','remarque','remark','comment','commentaire']
};
function normH(h){return String(h==null?'':h).toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w]/g,' ').replace(/\s+/g,' ').trim()}
function detectCols(header){
  const map={ref:-1,desig:-1,image:-1,cat:-1,price:-1,qty:-1,note:-1,raw:[]};
  const norm=header.map(h=>normH(h));map.raw=header.map(h=>String(h==null?'':h).trim());
  for(const key of Object.keys(COL_HINTS))for(const hint of COL_HINTS[key]){const n=normH(hint);const idx=norm.findIndex(h=>h&&h.includes(n));if(idx>=0&&map[key]===-1){map[key]=idx;break}}
  return map;
}
function findHeaderRow(aoa){
  const KW=['ref','reference','sku','designation','description','name','nom','image','photo','picture','price','prix','part','item','qty'];
  let bestIdx=0,bestScore=-1;const lim=Math.min(aoa.length,30);
  for(let i=0;i<lim;i++){const row=aoa[i]||[];let score=0,nonEmpty=0;for(const cell of row){const n=normH(cell);if(!n)continue;nonEmpty++;for(const kw of KW){if(n.includes(normH(kw))){score+=2;break}}}if(nonEmpty>=2)score+=nonEmpty*0.3;if(score>bestScore){bestScore=score;bestIdx=i}}
  return bestIdx;
}
function isImgCell(v){if(v==null)return false;const s=String(v).trim();if(!s)return false;if(/^data:image\//i.test(s))return true;if(/^https?:\/\/.+\.(png|jpg|jpeg|gif|webp)(\?.*)?$/i.test(s))return true;return false}

async function extractXlsxImages(buf){
  await ensureJSZip();
  let zip;try{zip=await JSZip.loadAsync(buf)}catch(e){return{}}
  const mediaMap={};
  await Promise.all(Object.keys(zip.files).filter(p=>/^xl\/media\//i.test(p)).map(p=>{
    const fname=p.split('/').pop();const ext=(fname.split('.').pop()||'').toLowerCase();
    const mime={png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',gif:'image/gif',bmp:'image/bmp',webp:'image/webp'}[ext]||'application/octet-stream';
    const f=zip.file(p);if(!f)return;
    return f.async('base64').then(b64=>{mediaMap[fname]='data:'+mime+';base64,'+b64});
  }));
  if(!Object.keys(mediaMap).length)return{};
  const wbXmlF=zip.file('xl/workbook.xml');if(!wbXmlF)return{};
  const wbXml=await wbXmlF.async('text');
  const sheetsOrdered=[];const sheetRe=/<sheet\b[^>]*>/g;let m;
  while((m=sheetRe.exec(wbXml))!==null){const tag=m[0];const nm=tag.match(/\bname="([^"]*)"/);const rid=tag.match(/\br:id="([^"]+)"/)|| tag.match(/\brelationships:id="([^"]+)"/i);if(nm&&rid)sheetsOrdered.push({name:nm[1],rId:rid[1]})}
  if(!sheetsOrdered.length)return{};
  const wbRelsF=zip.file('xl/_rels/workbook.xml.rels');if(!wbRelsF)return{};
  const wbRelsXml=await wbRelsF.async('text');
  const wbRels={};const relRe=/<Relationship\b[^>]*>/g;
  while((m=relRe.exec(wbRelsXml))!==null){const tag=m[0];const idM=tag.match(/\bId="([^"]+)"/);const tgM=tag.match(/\bTarget="([^"]+)"/);if(idM&&tgM)wbRels[idM[1]]=tgM[1]}
  const out={};
  for(const s of sheetsOrdered){
    const target=wbRels[s.rId];if(!target)continue;
    const sheetPath=target.replace(/^\//,'').startsWith('xl/')?target.replace(/^\//,''):'xl/'+target.replace(/^\.\.\//,'');
    const sheetRelsPath=sheetPath.replace(/([^/]+)$/,'_rels/$1.rels');
    const sheetRelsF=zip.file(sheetRelsPath);if(!sheetRelsF)continue;
    const sheetRelsXml=await sheetRelsF.async('text');
    let drawingTarget=null;relRe.lastIndex=0;
    while((m=relRe.exec(sheetRelsXml))!==null){const tag=m[0];if(!/drawing/i.test(tag))continue;const tgM=tag.match(/\bTarget="([^"]+)"/);if(tgM){drawingTarget=tgM[1];break}}
    if(!drawingTarget)continue;
    const drawingPath=drawingTarget.replace(/^\//,'').startsWith('xl/')?drawingTarget.replace(/^\//,''):'xl/'+drawingTarget.replace(/^\.\.\//,'');
    const drawingF=zip.file(drawingPath);if(!drawingF)continue;
    const drawingXml=await drawingF.async('text');
    const drawRelsPath=drawingPath.replace(/([^/]+)$/,'_rels/$1.rels');
    const drawRelsF=zip.file(drawRelsPath);if(!drawRelsF)continue;
    const drawRelsXml=await drawRelsF.async('text');
    const drRels={};relRe.lastIndex=0;
    while((m=relRe.exec(drawRelsXml))!==null){const tag=m[0];const idM=tag.match(/\bId="([^"]+)"/);const tgM=tag.match(/\bTarget="([^"]+)"/);if(idM&&tgM)drRels[idM[1]]=tgM[1].split('/').pop()}
    const rowMap={};const anchorRe=/<xdr:(twoCellAnchor|oneCellAnchor|absoluteAnchor)\b[^>]*>([\s\S]*?)<\/xdr:\1>/g;let am;
    while((am=anchorRe.exec(drawingXml))!==null){const inner=am[2];const fromRowM=inner.match(/<xdr:from>[\s\S]*?<xdr:row>(\d+)<\/xdr:row>/);const blipM=inner.match(/(?:r|relationships):embed="([^"]+)"/);if(!fromRowM||!blipM)continue;const row=parseInt(fromRowM[1],10);const rId=blipM[1];const mediaName=drRels[rId];if(!mediaName||!mediaMap[mediaName])continue;rowMap[row]=mediaMap[mediaName]}
    if(Object.keys(rowMap).length)out[s.name]=rowMap;
  }
  return out;
}

async function parseWorkbook(buf,fileName){
  const wb=XLSX.read(buf,{type:'array',cellStyles:false});
  let embeddedImages={};let embeddedError=null;let embeddedCount=0;
  try{embeddedImages=await extractXlsxImages(buf);embeddedCount=Object.values(embeddedImages).reduce((a,m)=>a+Object.keys(m).length,0)}
  catch(e){embeddedError=e&&(e.message||String(e))}
  const allRows=[];
  for(const sheetName of wb.SheetNames){
    const sheet=wb.Sheets[sheetName];
    const aoa=XLSX.utils.sheet_to_json(sheet,{header:1,defval:'',raw:false});
    if(!aoa.length)continue;
    const hIdx=findHeaderRow(aoa);const header=aoa[hIdx]||[];const cols=detectCols(header);const imgs=embeddedImages[sheetName]||{};
    for(let r=hIdx+1;r<aoa.length;r++){
      const row=aoa[r]||[];const hasEmb=imgs[r]!=null;
      if(!hasEmb&&!row.some(c=>String(c==null?'':c).trim()))continue;
      const get=i=>(i>=0&&i<row.length)?String(row[i]==null?'':row[i]).trim():'';
      let imageVal=get(cols.image);
      if(!imageVal)for(let c=0;c<row.length;c++){if(isImgCell(row[c])){imageVal=String(row[c]).trim();break}}
      if(!imageVal&&hasEmb)imageVal=imgs[r];
      const ref=get(cols.ref),desig=get(cols.desig),cat=get(cols.cat)||sheetName,price=get(cols.price),qty=get(cols.qty),note=get(cols.note);
      if(!ref&&!desig&&!imageVal)continue;
      const extra={};const usedCols=new Set([cols.ref,cols.desig,cols.image,cols.cat,cols.price,cols.qty,cols.note].filter(x=>x>=0));
      for(let c=0;c<row.length;c++){if(usedCols.has(c))continue;const k=(cols.raw[c]||('col_'+(c+1))).trim();const v=String(row[c]==null?'':row[c]).trim();if(k&&v)extra[k]=v}
      allRows.push({sheet:sheetName,ref,desig,image:imageVal,cat,price,qty,note,extra,_hasImage:!!imageVal});
    }
  }
  return{rows:allRows,sheets:wb.SheetNames,file:fileName,embeddedCount,embeddedError};
}

// ═══ Rendu ═══
function normalize(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}

function setView(v,btn){
  BOM.view=v;BOM.detail=null;
  document.querySelectorAll('.bom-view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBomView();
}

function bomFilter(){
  BOM.filterText=document.getElementById('bomSearch').value;
  BOM.detail=null;renderBomView();
}
function bomClearSearch(){document.getElementById('bomSearch').value='';BOM.filterText='';BOM.detail=null;renderBomView()}

function applyFilters(){
  const q=normalize(BOM.filterText);const cat=BOM.filterCat;
  BOM.filtered=BOM.rows.filter(r=>{
    if(cat!=='__all__'&&(r.cat||r.sheet)!==cat)return false;
    if(!q)return true;
    return normalize(r.ref+' '+r.desig+' '+r.cat+' '+r.note+' '+Object.values(r.extra||{}).join(' ')).includes(q);
  });
}

function renderBomView(){
  applyFilters();
  renderChips();
  document.getElementById('bomCount').textContent=BOM.filtered.length+' / '+BOM.rows.length+' pièces';
  if(BOM.view==='detail'&&BOM.detail!==null){renderDetail(BOM.detail);return}
  if(!BOM.filtered.length){document.getElementById('bomContent').innerHTML='<div class="bom-no-results">Aucune pièce ne correspond.</div>';return}
  if(BOM.view==='table')renderTable();else renderGrid();
}

function renderChips(){
  const cats=[...new Set(BOM.rows.map(r=>r.cat||r.sheet))];
  const total=BOM.rows.length;
  document.getElementById('chipBar').innerHTML=
    [['__all__','Toutes',total],...cats.map(c=>[c,c,BOM.rows.filter(r=>(r.cat||r.sheet)===c).length])]
    .map(([id,label,count])=>'<button class="chip'+(BOM.filterCat===id?' active':'')+'" onclick="setCat(\''+esc(id)+'\')">'+esc(label)+' <span class="chip-count">'+count+'</span></button>')
    .join('');
}
function setCat(c){BOM.filterCat=c;BOM.detail=null;renderBomView()}

function thumb(row){
  if(row.image)return '<div class="bom-thumb"><img src="'+esc(row.image)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"></div>';
  return '<div class="bom-thumb bom-thumb-empty">📷</div>';
}

function renderGrid(){
  document.getElementById('bomContent').innerHTML=
    '<div class="bom-grid">'+
    BOM.filtered.map((r,i)=>{
      const idx=BOM.rows.indexOf(r);
      return '<div class="bom-card" onclick="showDetail('+idx+')">'+
        thumb(r)+
        '<div class="bom-card-body">'+
          (r.ref?'<div class="bom-ref">'+esc(r.ref)+'</div>':'')+
          (r.desig?'<div class="bom-desig">'+esc(r.desig)+'</div>':'')+
          '<div class="bom-meta">'+
            (r.price?'<span>'+esc(r.price)+'</span>':'')+
            (r.qty?'<span>Qté: '+esc(r.qty)+'</span>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('')+
    '</div>';
}

function renderTable(){
  document.getElementById('bomContent').innerHTML=
    '<div class="bom-table-wrap"><table class="bom-table">'+
    '<thead><tr><th></th><th>Référence</th><th>Désignation</th><th>Catégorie</th><th>Prix</th><th>Qté</th></tr></thead>'+
    '<tbody>'+
    BOM.filtered.map(r=>{
      const idx=BOM.rows.indexOf(r);
      return '<tr onclick="showDetail('+idx+')">'+
        '<td class="td-thumb">'+(r.image?'<img src="'+esc(r.image)+'" loading="lazy" alt="">':'')+' </td>'+
        '<td class="td-ref"><code>'+esc(r.ref||'')+'</code></td>'+
        '<td>'+esc(r.desig||'')+'</td>'+
        '<td>'+esc(r.cat||r.sheet||'')+'</td>'+
        '<td>'+esc(r.price||'')+'</td>'+
        '<td>'+esc(r.qty||'')+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';
}

function showDetail(idx){BOM.detail=idx;BOM.view='detail';renderBomView()}

function renderDetail(idx){
  const r=BOM.rows[idx];if(!r){BOM.view='grid';renderBomView();return}
  const extraHtml=Object.entries(r.extra||{}).map(([k,v])=>'<div class="bom-detail-field"><div class="bom-detail-label">'+esc(k)+'</div><div class="bom-detail-value">'+esc(v)+'</div></div>').join('');
  document.getElementById('bomContent').innerHTML=
    '<div class="bom-detail">'+
      '<button class="bom-back" onclick="BOM.detail=null;BOM.view=\'grid\';renderBomView()">← Retour à la liste</button>'+
      '<div class="bom-detail-grid">'+
        '<div class="bom-detail-img">'+(r.image?'<img src="'+esc(r.image)+'" alt="">':'<div class="bom-detail-noimg">Aucune image</div>')+'</div>'+
        '<div class="bom-detail-info">'+
          (r.ref?'<div class="bom-detail-ref">'+esc(r.ref)+'</div>':'')+
          (r.desig?'<div class="bom-detail-desig">'+esc(r.desig)+'</div>':'')+
          '<div class="bom-detail-fields">'+
            (r.cat?'<div class="bom-detail-field"><div class="bom-detail-label">Catégorie</div><div class="bom-detail-value">'+esc(r.cat)+'</div></div>':'')+
            (r.price?'<div class="bom-detail-field"><div class="bom-detail-label">Prix</div><div class="bom-detail-value">'+esc(r.price)+'</div></div>':'')+
            (r.qty?'<div class="bom-detail-field"><div class="bom-detail-label">Quantité</div><div class="bom-detail-value">'+esc(r.qty)+'</div></div>':'')+
            (r.note?'<div class="bom-detail-field"><div class="bom-detail-label">Note</div><div class="bom-detail-value">'+esc(r.note)+'</div></div>':'')+
            extraHtml+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
}

// Fermer avec Échap
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!document.getElementById('bomOverlay').classList.contains('hidden'))closeBom()});
</script>
