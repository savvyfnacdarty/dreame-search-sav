.page-hero p{font-size:.85rem;opacity:.75;margin-top:4px}
.toolbar{max-width:960px;margin:22px auto 0;padding:0 16px;display:flex;flex-direction:column;gap:12px}
.search-box{display:flex;gap:8px;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:6px 6px 6px 16px;box-shadow:var(--shadow-md);transition:border-color var(--tr)}
.search-box:focus-within{border-color:var(--fd-red);box-shadow:0 0 0 4px var(--accent-glow)}
.search-box input{flex:1;border:none;outline:none;font-size:1rem;background:transparent;color:var(--text)}
.clear-btn{background:var(--surface-3);color:var(--text-2);border:none;border-radius:8px;padding:10px 14px;font-size:.9rem;cursor:pointer;font-weight:600;transition:background .2s}
.clear-btn:hover{background:var(--fd-red);color:#fff}
.toolbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}
.progress-wrap{flex:1;min-width:220px;display:flex;align-items:center;gap:10px}
.progress-num{font-size:.8rem;font-weight:700;color:var(--text-2);white-space:nowrap}
.progress-num em{font-style:normal;color:var(--muted);font-weight:600}
.progress-bar{flex:1;height:8px;background:var(--surface-3);border-radius:20px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--fd-yellow),var(--green));border-radius:20px;transition:width .3s}
.results{max-width:960px;margin:18px auto 48px;padding:0 16px;display:flex;flex-direction:column;gap:12px}
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results .icon{font-size:3rem;margin-bottom:12px}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm);overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr)}
.test-card.open{border-color:var(--fd-red);box-shadow:var(--shadow-md)}
.test-card.done{border-left:4px solid var(--green)}
.test-header{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none}
.test-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:#0f3460;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700}
.test-card.done .test-num{background:var(--green)}
.test-titles{flex:1;min-width:0}
.test-name{font-size:1.05rem;font-weight:700;color:var(--text);text-transform:capitalize}
.test-desc{font-size:.82rem;color:var(--muted);margin-top:1px}
.test-badges{display:flex;gap:6px;flex-shrink:0}
.mini-badge{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--surface-3);color:var(--text-2)}
.mini-badge.img{background:#e0f2fe;color:#075985}
.mini-badge.vid{background:#fee2e2;color:#b91c1c}
[data-theme="dark"] .mini-badge.img{background:#16324a;color:#7dd3fc}
[data-theme="dark"] .mini-badge.vid{background:#431414;color:#fca5a5}
.test-arrow{flex-shrink:0;color:var(--muted);transition:transform .2s}
.test-card.open .test-arrow{transform:rotate(180deg);color:var(--fd-red)}
.test-body{display:none;padding:0 18px 18px;border-top:1px solid var(--rule)}
.test-card.open .test-body{display:block}
.tb-section{margin-top:16px}
.tb-title{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;border-bottom:2px solid var(--fd-red);padding-bottom:3px;display:inline-block}
.msg-list{display:flex;flex-direction:column;gap:6px}
.msg-item{display:flex;gap:10px;align-items:flex-start;background:var(--surface-2);border-left:3px solid #63b3ed;padding:8px 12px;border-radius:6px;font-size:.88rem;color:var(--text-2);line-height:1.5}
[data-theme="dark"] .msg-item{border-left-color:#2b6cb0}
.msg-item.pass{border-left-color:var(--green);background:var(--green-bg);color:var(--green)}
.msg-ico{flex-shrink:0;font-size:.95rem;line-height:1.4}
.result-box{background:var(--orange-bg);border-left:3px solid var(--orange);padding:10px 14px;border-radius:6px;font-size:.86rem;color:var(--orange);line-height:1.6;white-space:pre-line}
.img-grid{display:flex;flex-wrap:wrap;gap:8px}
.img-grid img{height:130px;width:auto;max-width:220px;object-fit:cover;border-radius:8px;border:2px solid var(--border);cursor:pointer;transition:transform .15s,border-color .15s;background:var(--surface-2)}
.img-grid img:hover{transform:scale(1.03);border-color:var(--fd-red)}
.video-container video{width:100%;max-width:560px;border-radius:10px;border:2px solid var(--border);display:block;background:#000}
.video-embed{position:relative;width:100%;max-width:640px;aspect-ratio:16/9;border-radius:10px;overflow:hidden;border:2px solid var(--border);background:#000}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
@supports not (aspect-ratio:16/9){.video-embed{height:0;padding-bottom:56.25%}}
.done-row{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--border)}
.done-row label{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--text-2)}
.done-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--green)}
.src-banner{max-width:960px;margin:12px auto 0;padding:0 16px}
.src-inner{display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--muted);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:8px 14px}
.src-inner .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.src-inner.warn .dot{background:var(--orange)}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;justify-content:center;align-items:center}
#lightbox.open{display:flex}
#lightbox img{max-width:84vw;max-height:88vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#lightbox-close{position:fixed;top:20px;right:28px;color:#fff;font-size:2rem;cursor:pointer;z-index:1001;line-height:1}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);display:none;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:1.8rem;cursor:pointer;z-index:1001;user-select:none;transition:background .15s}
.lightbox-nav:hover{background:rgba(255,255,255,.28)}
#lightbox-prev{left:24px}#lightbox-next{right:24px}
#lightbox-counter{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);color:#fff;font-size:.95rem;background:rgba(0,0,0,.45);padding:4px 14px;border-radius:20px;z-index:1001;display:none}
@media(max-width:600px){.page-hero h1{font-size:1.3rem}.test-desc{display:none}.img-grid img{height:90px}.hdr{padding:0 12px}.hdr-in{gap:8px;height:56px;overflow-x:auto}.hdr-nav{margin-left:8px}.hdr-logo-brand{font-size:18px}.lightbox-nav{width:44px;height:44px;font-size:1.5rem}#lightbox-prev{left:8px}#lightbox-next{right:8px}#lightbox img{max-width:94vw}}

let TESTS = EMBED.slice();

const _manifestLow = {};
MANIFEST.forEach(f => { _manifestLow[f.toLowerCase()] = f; });
function isHttp(v){ return /^https?:\/\//i.test(String(v||'').trim()); }
function resolveMedia(val){
  if(!val) return '';
  val = String(val).trim();
  if(!val) return '';
  if(isHttp(val)) return val;            // URL Vimeo / SharePoint : utilisée telle quelle
  let real = _manifestLow[val.toLowerCase()];
  if(!real){
    for(const ext of ['.png','.jpg','.jpeg','.mov','.mp4']){
      if(_manifestLow[(val+ext).toLowerCase()]){ real = _manifestLow[(val+ext).toLowerCase()]; break; }
    }
  }
  if(!real) real = val;
  return MEDIA_BASE + encodeURI(real);   // repli : fichier local
}
function isVideo(name){ return /\.(mov|mp4|webm|m4v)(\?|$)/i.test(name||''); }
/* Transforme une URL Vimeo (publique/privée/embed) en URL d'intégration player. */
function vimeoEmbed(url){
  url = String(url||'').trim();
  if(/player\.vimeo\.com\/video\//i.test(url)) return url;        // déjà une URL d'intégration
  const priv = url.match(/vimeo\.com\/(\d+)\/([0-9a-zA-Z]+)/i);   // vidéo privée : /ID/HASH
  if(priv) return 'https://player.vimeo.com/video/'+priv[1]+'?h='+priv[2];
  const pub = url.match(/vimeo\.com\/(?:video\/)?(\d+)/i);        // vidéo publique : /ID
  if(pub) return 'https://player.vimeo.com/video/'+pub[1];
  return '';                                                       // pas reconnu comme Vimeo
}
function slug(s){ return String(s).trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

const LS_DONE = 'fd_bit_single_done';
let doneSet = new Set();
(function(){ try{ const r=localStorage.getItem(LS_DONE); if(r) doneSet=new Set(JSON.parse(r)); }catch(e){} })();
function saveDone(){ try{ localStorage.setItem(LS_DONE, JSON.stringify([...doneSet])); }catch(e){} }
function toggleDone(id, on){ if(on) doneSet.add(id); else doneSet.delete(id); saveDone(); render(); }
function resetDone(){ doneSet.clear(); saveDone(); render(); showToast('Progression réinitialisée'); }

const LS_THEME='fd_sav_theme';
function toggleTheme(){ const n=document.documentElement.dataset.theme==='dark'?'light':'dark'; applyTheme(n); try{localStorage.setItem(LS_THEME,n);}catch(e){} }
function applyTheme(t){ document.documentElement.dataset.theme=t; document.getElementById('themeToggle').textContent=t==='dark'?'☾':'☀'; }
(function(){ try{ const s=localStorage.getItem(LS_THEME); if(s) applyTheme(s); }catch(e){} })();
let _tt; function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2200); }
function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let galleryImgs=[], galleryIndex=0;
function openLightbox(el){
  const grid = el.closest && el.closest('.img-grid');
  const srcs = grid ? Array.from(grid.querySelectorAll('img')).map(i=>i.getAttribute('src')) : [el.getAttribute('src')];
  galleryIndex = Math.max(0, srcs.indexOf(el.getAttribute('src')));
  galleryImgs = srcs; showLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function showLightbox(){
  document.getElementById('lightbox-img').src = galleryImgs[galleryIndex];
  const multi = galleryImgs.length>1;
  document.getElementById('lightbox-prev').style.display = multi?'flex':'none';
  document.getElementById('lightbox-next').style.display = multi?'flex':'none';
  const c=document.getElementById('lightbox-counter');
  c.style.display = multi?'block':'none'; c.textContent=(galleryIndex+1)+' / '+galleryImgs.length;
}
function lightboxNav(d,e){ if(e)e.stopPropagation(); if(!galleryImgs.length)return; galleryIndex=(galleryIndex+d+galleryImgs.length)%galleryImgs.length; showLightbox(); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(!document.getElementById('lightbox').classList.contains('open'))return; if(e.key==='Escape')closeLightbox(); if(e.key==='ArrowLeft')lightboxNav(-1); if(e.key==='ArrowRight')lightboxNav(1); });

function clearSearch(){ const i=document.getElementById('searchInput'); i.value=''; render(); i.focus(); }

let openSet = new Set();
function toggleCard(id){ if(openSet.has(id))openSet.delete(id); else openSet.add(id); render(); }
function expandAll(on){ openSet = on ? new Set(TESTS.map(t=>t.id)) : new Set(); render(); }

function mediaHtml(t){
  let html='';
  const imgs = (t.images||[]).map(resolveMedia).filter(Boolean);
  const vidName = t.video||'';
  if(imgs.length){
    html += '<div class="tb-section"><div class="tb-title">Captures écran</div><div class="img-grid">';
    imgs.forEach(src => { html += '<img loading="lazy" src="'+escHtml(src)+'" alt="" onclick="openLightbox(this)" onerror="this.style.display=&#39;none&#39;">'; });
    html += '</div></div>';
  }
  if(vidName){
    let inner='';
    const emb = isHttp(vidName) ? vimeoEmbed(vidName) : '';
    if(emb){
      // Vimeo : lecteur intégré (iframe responsive 16:9)
      inner = '<div class="video-embed"><iframe src="'+escHtml(emb)+'" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen title="'+escHtml(t.name)+'"></iframe></div>';
    } else {
      const vsrc = resolveMedia(vidName);
      if(isVideo(vsrc)){
        inner = '<div class="video-container"><video controls preload="metadata" src="'+escHtml(vsrc)+'" onerror="this.parentNode.parentNode.style.display=&#39;none&#39;"></video></div>';
      } else if(vsrc){
        // URL/fichier non vidéo et non Vimeo : tenté en image
        inner = '<div class="img-grid"><img loading="lazy" src="'+escHtml(vsrc)+'" alt="" onclick="openLightbox(this)" onerror="this.parentNode.parentNode.style.display=&#39;none&#39;"></div>';
      }
    }
    if(inner) html += '<div class="tb-section"><div class="tb-title">Vidéo</div>'+inner+'</div>';
  }
  return html;
}
function msgHtml(infos){
  if(!infos||!infos.length) return '';
  let out='<div class="tb-section"><div class="tb-title">Consignes opérateur / messages affichés</div><div class="msg-list">';
  infos.forEach(line=>{
    const pass = /(test r[ée]ussi|test termin[ée]|passed|checking passed)/i.test(line);
    out += '<div class="msg-item'+(pass?' pass':'')+'"><span class="msg-ico">'+(pass?'✔':'▸')+'</span><span>'+escHtml(line)+'</span></div>';
  });
  out+='</div></div>';
  return out;
}
function render(){
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  document.getElementById('clearBtn').style.display = q?'block':'none';
  const list = q ? TESTS.filter(t => (t.name+' '+t.desc+' '+(t.effectue||'')+' '+(t.infos||[]).join(' ')).toLowerCase().includes(q)) : TESTS;
  const root = document.getElementById('results');
  if(!list.length){
    root.innerHTML = '<div class="no-results"><div class="icon">&#128269;</div><p>Aucun test ne correspond &agrave; &laquo; '+escHtml(q)+' &raquo;.</p></div>';
  } else {
    root.innerHTML = list.map(t=>{
      const idx = TESTS.indexOf(t)+1;
      const isOpen = openSet.has(t.id);
      const isDone = doneSet.has(t.id);
      const nImg = (t.images||[]).length;
      const hasVid = !!t.video;
      let badges='';
      if(nImg) badges += '<span class="mini-badge img">&#128247; '+nImg+'</span>';
      if(hasVid) badges += '<span class="mini-badge vid">&#9654; vid&eacute;o</span>';
      if(isDone) badges += '<span class="mini-badge" style="background:var(--green-bg);color:var(--green)">&#10003;</span>';
      let body='';
      body += msgHtml(t.infos);
      if(t.effectue) body += '<div class="tb-section"><div class="tb-title">R&eacute;sultat attendu / test effectu&eacute;</div><div class="result-box">'+escHtml(t.effectue)+'</div></div>';
      body += mediaHtml(t);
      if(!(t.infos||[]).length && !t.effectue && !nImg && !hasVid) body += '<div class="tb-section" style="color:var(--muted);font-size:.85rem">Aucune ressource renseign&eacute;e pour ce test dans l&#39;Excel.</div>';
      body += '<div class="done-row"><label><input type="checkbox" '+(isDone?'checked':'')+' onchange="toggleDone(&#39;'+t.id+'&#39;,this.checked)"> Test effectu&eacute;</label></div>';
      return '<div class="test-card'+(isOpen?' open':'')+(isDone?' done':'')+'" id="card-'+t.id+'">'
        + '<div class="test-header" onclick="toggleCard(&#39;'+t.id+'&#39;)">'
        +   '<div class="test-num">'+idx+'</div>'
        +   '<div class="test-titles"><div class="test-name">'+escHtml(t.name)+'</div><div class="test-desc">'+escHtml(t.desc)+'</div></div>'
        +   '<div class="test-badges">'+badges+'</div>'
        +   '<svg class="test-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>'
        + '</div>'
        + '<div class="test-body">'+body+'</div>'
        + '</div>';
    }).join('');
  }
  document.getElementById('doneCount').textContent = doneSet.size;
  document.getElementById('totalCount').textContent = TESTS.length;
  const pct = TESTS.length ? Math.round(doneSet.size/TESTS.length*100) : 0;
  document.getElementById('progFill').style.width = pct+'%';
}

function parseSheet(rows){
  const out=[];
  rows.forEach(r=>{
    const name=(r[0]||'').toString().trim();
    if(!name) return;
    if(name.toLowerCase()==='bit test single') return;
    if((r[1]||'').toString().trim().toLowerCase()==='bit test single') return;
    const infos=(r[2]||'').toString().split('\n').map(s=>s.trim()).filter(Boolean);
    const images=[r[3],r[4]].map(v=>(v||'').toString().trim()).filter(Boolean);
    out.push({ id:slug(name), name:name, desc:(r[1]||'').toString().trim(),
      infos:infos, images:images, video:(r[5]||'').toString().trim(), effectue:(r[6]||'').toString().trim() });
  });
  return out;
}
async function fetchExcelBuffer(){
  let lastErr=null;
  for(const url of EXCEL_CANDIDATES){
    try{
      const res = await fetch(url);
      if(res.ok) return await res.arrayBuffer();
      lastErr = new Error('HTTP '+res.status);
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error('Excel introuvable');
}
async function loadExcel(){
  const banner=document.getElementById('srcBanner'), txt=document.getElementById('srcText');
  try{
    const buf = await fetchExcelBuffer();
    const wb = XLSX.read(buf,{type:'array'});
    const ws = wb.Sheets[SHEET_NAME] || wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const parsed = parseSheet(rows);
    if(parsed.length){ TESTS = parsed; txt.textContent = TESTS.length+' tests chargés depuis BIT-Test.xlsx (mise à jour automatique).'; }
    else { txt.textContent = TESTS.length+' tests (instantané intégré).'; }
  }catch(err){
    banner.classList.add('warn');
    txt.textContent = TESTS.length+' tests (instantané intégré — Excel non lu en direct : '+err.message+').';
  }
  render();
}
document.addEventListener('DOMContentLoaded', loadExcel);
